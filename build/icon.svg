<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Teal background -->
  <rect width="1024" height="1024" rx="216" fill="#2D56D2"/>

  <!-- White ASCII-block octopus (24×20 design grid, scaled ×40, centered) -->
  <g transform="translate(72 112) scale(40)" shape-rendering="crispEdges">
    <g fill="#ffffff">
      <rect x="8" y="2" width="6" height="8"/>
      <rect x="8" y="0" width="6" height="2"/>
      <rect x="7" y="2" width="1" height="12"/>
      <rect x="14" y="2" width="1" height="2"/>
      <rect x="14" y="4" width="1" height="6"/>
      <rect x="6" y="10" width="1" height="2"/>
      <rect x="14" y="10" width="2" height="2"/>
      <rect x="5" y="12" width="1" height="2"/>
      <rect x="8" y="12" width="7" height="2"/>
      <rect x="16" y="12" width="1" height="2"/>
      <rect x="4" y="14" width="1" height="2"/>
      <rect x="8" y="14" width="1" height="2"/>
      <rect x="13" y="14" width="1" height="2"/>
      <rect x="17" y="14" width="1" height="2"/>
      <rect x="3" y="16" width="1" height="2"/>
      <rect x="7" y="16" width="1" height="2"/>
      <rect x="14" y="16" width="1" height="2"/>
      <rect x="18" y="16" width="1" height="2"/>
      <rect x="1" y="18" width="2" height="2"/>
      <rect x="6" y="18" width="1" height="2"/>
      <rect x="15" y="18" width="1" height="2"/>
      <rect x="19" y="18" width="2" height="2"/>
    </g>
    <!-- Teal eyes -->
    <g fill="#2DD2A9">
      <rect x="8" y="4" width="2" height="4"/>
      <rect x="15" y="4" width="2" height="4"/>
    </g>
  </g>
</svg>
